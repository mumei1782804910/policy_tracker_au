const NAV = {
  en:{home:"Home", politicians:"Politicians", parties:"Parties"},
  zhs:{home:"首页", politicians:"政治人物", parties:"政党"},
  zht:{home:"首頁", politicians:"政治人物", parties:"政黨"},
  ar:{home:"الرئيسية", politicians:"السياسيون", parties:"الأحزاب"},
  vi:{home:"Trang chủ", politicians:"Chính trị gia", parties:"Đảng phái"},
  pa:{home:"ਹੋਮ", politicians:"ਸਿਆਸਤਦਾਨ", parties:"ਪਾਰਟੀਆਂ"}
};

let lang = "en";
let current = "labor";
(function(){ const p = new URLSearchParams(location.search).get("lang"); if(p && UI[p]) lang = p; })();

function applyStatic(){
  const u = UI[lang];
  document.documentElement.lang = (lang==="zhs"?"zh-Hans":lang==="zht"?"zh-Hant":lang);
  document.documentElement.dir = (lang==="ar"?"rtl":"ltr");
  document.getElementById("langSel").value = lang;
  document.querySelectorAll(".nav a").forEach(a=>{
    a.textContent = NAV[lang][a.dataset.page];
    a.href = a.dataset.file + "?lang=" + lang;
  });
  document.title = u.docTitle || u.title;
  document.getElementById("pageTitle").textContent = u.title;
  document.getElementById("pageSub").textContent = u.sub;
  document.getElementById("langLabel").textContent = u.langLabel;
  document.getElementById("filterLabel").textContent = u.filterLabel;
  document.querySelectorAll(".tab").forEach(b=>{ b.textContent = TABS[b.dataset.tab][lang]; });
  document.querySelectorAll(".h-date").forEach(e=>e.textContent=u.colDate);
  document.querySelectorAll(".h-type").forEach(e=>e.textContent=u.colType);
  document.querySelectorAll(".h-pol").forEach(e=>e.textContent=u.colPol);
  document.querySelectorAll(".h-sent").forEach(e=>e.textContent=u.colSent);
  document.getElementById("legend").innerHTML =
    `<b>${u.legTitle}</b> <span class="sent pos">${u.sentPos}</span> ${u.legPos} &nbsp;·&nbsp; <span class="sent neg">${u.sentNeg}</span> ${u.legNeg} ${u.legNote}`;
  document.getElementById("footer").textContent = u.footer;
}

function rebuildFilter(){
  const u = UI[lang];
  const sel = document.getElementById("typeFilter");
  const prev = sel.value;
  const types = [...new Set(DATA[current].map(r=>r.type))];
  sel.innerHTML = `<option value="all">${u.allTypes}</option>`+
    types.map(t=>`<option value="${t}">${TYPES[t][lang]}</option>`).join("");
  if(prev && [...sel.options].some(o=>o.value===prev)) sel.value = prev;
}

function render(){
  const u = UI[lang];
  const rows = [...DATA[current]].sort((a,b)=>b.sort.localeCompare(a.sort));
  const filter = document.getElementById("typeFilter").value;
  const tbody = document.getElementById("body-"+current);
  tbody.innerHTML = "";
  let shown = 0;
  rows.forEach(r=>{
    if(filter!=="all" && r.type!==filter) return;
    shown++;
    const dateText = r.ongoing ? u.ongoing : r.date;
    const sentText = r.sent==="pos" ? u.sentPos : u.sentNeg;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="date">${dateText}</td>`+
      `<td><span class="type">${TYPES[r.type][lang]}</span></td>`+
      `<td>${r.pos[lang]}</td>`+
      `<td><span class="sent ${r.sent}">${sentText}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById("count").textContent = `${shown} / ${rows.length} ${u.unit}`;
}

document.getElementById("langSel").addEventListener("change", e=>{
  lang = e.target.value;
  const params = new URLSearchParams(location.search);
  params.set("lang", lang);
  history.replaceState(null, "", "?" + params.toString());
  applyStatic(); rebuildFilter(); render();
});
document.getElementById("typeFilter").addEventListener("change", render);
document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    current = btn.dataset.tab;
    document.getElementById("panel-"+current).classList.add("active");
    rebuildFilter(); render();
  });
});

applyStatic(); rebuildFilter(); render();
</script>
